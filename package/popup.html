<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Voice</title>
    <link rel="stylesheet" href="./style/styles.min.css" />
  </head>
  <body>
    <label for="speaker">話者選択:</label>
    <select id="speaker" name="speaker"></select
    ><br />
    <label for="apiKeyVOICEVOX">VOICEVOX API Key:</label>
    <input type="text" id="apiKeyVOICEVOX" name="apiKeyVOICEVOX" /><br />
    <label for="apiKeyYoutube">YouTube API Key:</label>
    <input type="text" id="apiKeyYoutube" name="apiKeyYoutube" /><br />

    <div class="button-container">
      <div class="tooltip">
        <button id="play">Play</button>
        <span class="tooltiptext" id="play-tooltip"
          >ショートカット: Alt+Shift+S</span
        >
      </div>
      <div class="tooltip">
        <button id="stop">Stop</button>
        <span class="tooltiptext" id="stop-tooltip"
          >ショートカット: Alt+Shift+Q</span
        >
      </div>
    </div>

    <br />
    <button id="decrease-speed">-0.1 Speed</button>
    <button id="reset-speed">Reset Speed</button>
    <button id="increase-speed">+0.1 Speed</button>
    <p id="current-speed">Current Speed: 1.0</p>
    <label for="speed">Speed:</label>
    <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0" />
    <label for="volume">Volume:</label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1" />
    <p id="current-volume">Current Volume: 1.0</p>
    <div class="toggle-container">
      <label class="toggle-switch">
        <input type="checkbox" id="latestOnlyMode" />
        <span class="slider round"></span>
      </label>
      <span>最新コメントのみ取得モード</span>
    </div>
    <p id="error" style="color: red"></p>
    <div class="accordion">
      <button class="accordion-button">ログ表示</button>
      <div class="accordion-content">
        <pre id="debug"></pre>
      </div>
    </div>
    <br />
    <script src="popup.js"></script>
  </body>
</html>
