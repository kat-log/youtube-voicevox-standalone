name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Create zip
        run: |
          cd dist
          zip -r ../youtube-voicevox-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: youtube-voicevox-*.zip
