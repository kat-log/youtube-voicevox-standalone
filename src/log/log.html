<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Voice - ログ表示</title>
    <style>
      body {
        width: 100% !important;
        max-width: 100% !important;
        max-height: none !important;
        height: 100vh;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .log-container {
        padding: 20px;
        height: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      .log-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .log-header h1 {
        margin: 0;
        font-size: 20px;
      }
      .log-content {
        flex: 1;
        overflow-y: auto;
        background-color: var(--bg-section);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 10px;
      }
      #debug {
        font-family: monospace;
      }
      .log-separator {
        color: #2196F3;
        font-weight: bold;
      }
      .dark-mode .log-separator {
        color: #64B5F6;
      }
      /* ログレベルフィルタバー */
      .log-filter-bar {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }
      .log-filter-btn {
        font-size: 11px;
        padding: 3px 10px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: var(--bg-section);
        color: var(--text-secondary);
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .log-filter-btn.active {
        background: var(--accent-color);
        color: white;
        border-color: var(--accent-color);
      }
      /* ログレベル別カラー */
      .log-debug { color: #94a3b8; }
      .log-warn { color: #d97706; }
      .log-error { color: #dc2626; font-weight: bold; }
      .dark-mode .log-debug { color: #64748b; }
      .dark-mode .log-warn { color: #fbbf24; }
      .dark-mode .log-error { color: #f87171; }
    </style>
  </head>
  <body>
    <div class="log-container">
      <div class="log-header">
        <h1>拡張機能 ログ一覧</h1>
        <button id="clear-log" class="small-btn">ログをクリア</button>
      </div>
      <div class="log-filter-bar" id="log-filter-bar">
        <button class="log-filter-btn" data-level="debug">DEBUG</button>
        <button class="log-filter-btn active" data-level="info">INFO</button>
        <button class="log-filter-btn active" data-level="warn">WARN</button>
        <button class="log-filter-btn active" data-level="error">ERROR</button>
      </div>
      <div class="log-content" id="log-content-area">
        <pre id="debug"></pre>
      </div>
    </div>
    <script type="module" src="./log.ts"></script>
  </body>
</html>
