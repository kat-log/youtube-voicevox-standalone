<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ずんだもん読み上げ - テスト再生</title>
    <style>
      body {
        width: 100% !important;
        max-width: 100% !important;
        max-height: none !important;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .page-container {
        max-width: 640px;
        margin: 0 auto;
        padding: 24px 20px 60px;
      }
      .page-header {
        text-align: center;
        margin-bottom: 20px;
      }
      .page-header h1 {
        margin: 0 0 4px;
        font-size: 20px;
      }
      .page-header p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 13px;
      }

      /* Test text form */
      .test-text-form {
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--bg-primary);
        padding: 12px 0;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
      }
      .test-text-form label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .test-text-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
      }
      .test-text-input:focus {
        border-color: var(--accent-color);
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
        align-items: center;
      }
      .toolbar-search {
        flex: 1;
        min-width: 140px;
        padding: 6px 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        font-size: 13px;
        outline: none;
      }
      .toolbar-search:focus {
        border-color: var(--accent-color);
      }
      .toolbar-btn {
        padding: 6px 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }
      .toolbar-btn:hover {
        background: var(--border-color);
      }

      /* Character group */
      .char-group {
        margin-bottom: 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        overflow: hidden;
      }
      .char-group.hidden {
        display: none;
      }
      .char-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--bg-section);
        cursor: pointer;
        user-select: none;
      }
      .char-header:hover {
        background: var(--border-color);
      }
      .char-name {
        flex: 1;
        font-weight: 600;
        font-size: 14px;
      }
      .char-count {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .char-arrow {
        font-size: 12px;
        color: var(--text-secondary);
        transition: transform 0.2s;
      }
      .char-group.open .char-arrow {
        transform: rotate(90deg);
      }
      .char-styles {
        display: none;
        padding: 4px 14px 8px 14px;
      }
      .char-group.open .char-styles {
        display: block;
      }
      .style-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
      }
      .style-item.hidden {
        display: none;
      }
      .style-label {
        font-size: 13px;
        flex: 1;
      }
      .style-id {
        font-size: 11px;
        color: var(--text-secondary);
      }

      /* Play button & status */
      .play-btn {
        padding: 4px 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
      }
      .play-btn:hover {
        background: var(--border-color);
      }
      .play-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .play-status {
        font-size: 11px;
        color: var(--text-secondary);
        min-width: 50px;
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--text-secondary);
      }
      .error-msg {
        text-align: center;
        padding: 20px;
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="page-header">
        <h1>テスト再生</h1>
        <p id="engine-label">読み込み中...</p>
      </div>

      <div class="test-text-form">
        <label for="testText">読み上げテキスト:</label>
        <input
          type="text"
          class="test-text-input"
          id="testText"
          value="こんにちは、テスト再生です"
          placeholder="読み上げたいテキストを入力"
        />
      </div>

      <div class="toolbar">
        <button type="button" class="toolbar-btn" id="expandAllBtn">全て開く</button>
        <button type="button" class="toolbar-btn" id="collapseAllBtn">全て閉じる</button>
        <input type="text" class="toolbar-search" id="searchInput" placeholder="話者を検索..." />
      </div>

      <div id="speakerList">
        <div class="loading" id="loadingMsg">話者リストを取得中...</div>
      </div>
    </div>

    <script type="module" src="./test-speak.ts"></script>
  </body>
</html>
