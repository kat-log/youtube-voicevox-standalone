<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>YouTubeライブチャットずんだもんボイス読み上げ</title>
  </head>
  <body>
    <!-- ステータスバー -->
    <div id="status-bar" class="status-bar" aria-live="polite" role="status">
      <span id="status-dot" class="status-dot idle"></span>
      <span id="status-text">停止中</span>
      <span id="status-count"></span>
      <span id="queue-info" class="queue-info"></span>
    </div>

    <!-- APIキー未設定バナー -->
    <div id="api-key-banner" class="api-key-banner" style="display: none" role="alert">
      <span>まずはYouTube APIキーの設定をお願いします。</span>
      <a href="/onboarding/onboarding.html#youtube-api" target="_blank">設定方法を見る →</a>
    </div>

    <!-- 操作セクション -->
    <div class="section">
      <div class="button-container">
        <div class="tooltip">
          <button id="play" aria-label="読み上げを開始する">読み上げ開始</button>
          <span class="tooltiptext" id="play-tooltip">ショートカット: Alt+Shift+S</span>
        </div>
        <div class="tooltip">
          <button id="stop" aria-label="読み上げを停止する" disabled>停止</button>
          <span class="tooltiptext" id="stop-tooltip">ショートカット: Alt+Shift+Q</span>
        </div>
      </div>
      <p id="error" role="alert" aria-live="assertive"></p>
    </div>

    <!-- 音声設定セクション -->
    <div class="section">
      <div class="section-title">音声設定</div>

      <label for="ttsEngine">読み上げエンジン:</label>
      <select id="ttsEngine" name="ttsEngine">
        <option value="voicevox">VOICEVOX（TTS Quest API）</option>
        <option value="browser">ブラウザ内蔵音声</option>
      </select>

      <div id="voicevox-settings">
        <label for="speaker">話者選択:</label>
        <select id="speaker" name="speaker"></select>
      </div>

      <div id="browser-tts-settings" style="display: none">
        <label for="browserVoice">ブラウザ音声:</label>
        <select id="browserVoice" name="browserVoice"></select>
        <p id="no-ja-voices-warning" class="warning-text" style="display: none">
          日本語音声が見つかりません。システム設定またはChrome
          TTS拡張機能で日本語音声を追加してください。
        </p>
      </div>

      <label for="speed">再生速度:</label>
      <div class="slider-group">
        <input
          type="range"
          id="speed"
          min="0.1"
          max="3.0"
          step="0.1"
          value="1.0"
          aria-label="再生速度"
          aria-valuetext="1.0倍速"
        />
        <span id="current-speed">1.0x</span>
        <button id="reset-speed" class="small-btn" aria-label="再生速度をリセット">リセット</button>
      </div>
      <p id="speed-unsupported-info" class="info-text" style="display: none">
        この音声では再生速度の変更はサポートされていません（等速固定）
      </p>

      <label for="volume">音量:</label>
      <div class="slider-group">
        <input
          type="range"
          id="volume"
          min="0"
          max="1"
          step="0.1"
          value="1"
          aria-label="音量"
          aria-valuetext="音量100%"
        />
        <span id="current-volume">1.0</span>
      </div>
    </div>

    <!-- 設定セクション -->
    <div class="section">
      <div class="section-title">設定</div>

      <div class="label-with-help">
        <label for="apiKeyYoutube">YouTube API Key:</label>
        <a
          href="/onboarding/onboarding.html#youtube-api"
          target="_blank"
          class="help-link"
          title="APIキーの取得方法を見る"
          >?</a
        >
      </div>
      <div class="api-key-container">
        <input
          type="password"
          id="apiKeyYoutube"
          name="apiKeyYoutube"
          placeholder="YouTube Data API v3 キーを入力"
        />
        <button
          type="button"
          id="toggle-api-key"
          class="toggle-visibility"
          aria-label="APIキーの表示/非表示を切替"
        >
          👀
        </button>
      </div>

      <div id="voicevox-api-key-section" class="accordion">
        <div class="tooltip-block">
          <button class="accordion-button" type="button">
            詳細設定（VOICEVOX API / 任意・高速化）
          </button>
          <span class="tooltiptext"
            >生成処理が高速化され快適になるため、設定をおすすめします！</span
          >
        </div>
        <div class="accordion-content">
          <div class="label-with-help">
            <label for="apiKeyVOICEVOX">VOICEVOX API Key:</label>
            <a
              href="/onboarding/onboarding.html#voicevox-api"
              target="_blank"
              class="help-link"
              title="APIキーの取得方法を見る"
              >?</a
            >
          </div>
          <div class="api-key-container">
            <input
              type="password"
              id="apiKeyVOICEVOX"
              name="apiKeyVOICEVOX"
              placeholder="APIキーを入力"
            />
            <button
              type="button"
              id="toggle-voicevox-key"
              class="toggle-visibility"
              aria-label="APIキーの表示/非表示を切替"
            >
              👀
            </button>
          </div>
        </div>
      </div>

      <div class="toggle-container">
        <label class="toggle-switch" aria-label="最新コメントのみ取得モード">
          <input type="checkbox" id="latestOnlyMode" role="switch" aria-checked="false" />
          <span class="slider round"></span>
        </label>
        <span>最新コメントのみ取得モード</span>
      </div>

      <div class="toggle-container">
        <label class="toggle-switch" aria-label="ダークモード">
          <input type="checkbox" id="darkMode" role="switch" aria-checked="false" />
          <span class="slider round"></span>
        </label>
        <span>ダークモード</span>
      </div>
    </div>

    <!-- コメントフィルター設定 -->
    <div class="section">
      <div class="section-title">コメントフィルター</div>

      <div class="toggle-container">
        <label class="toggle-switch" aria-label="コメントフィルターを有効にする">
          <input type="checkbox" id="filterEnabled" role="switch" aria-checked="false" />
          <span class="slider round"></span>
        </label>
        <span>フィルターを有効化</span>
      </div>

      <div id="filter-options" class="filter-options" style="display: none">
        <label for="filterMinLength">最小文字数（これ未満はスキップ）:</label>
        <div class="slider-group">
          <input
            type="range"
            id="filterMinLength"
            min="1"
            max="20"
            step="1"
            value="1"
            aria-label="最小文字数"
            aria-valuetext="1文字"
          />
          <span id="current-min-length">1</span>
        </div>

        <div class="toggle-container">
          <label class="toggle-switch" aria-label="絵文字のみのコメントをスキップ">
            <input type="checkbox" id="filterSkipEmojiOnly" role="switch" aria-checked="false" />
            <span class="slider round"></span>
          </label>
          <span>絵文字のみのコメントをスキップ</span>
        </div>

        <label for="filterNgWords">NGワード（カンマ区切り・部分一致）:</label>
        <input type="text" id="filterNgWords" placeholder="例: スパム,宣伝,http" />
      </div>
    </div>

    <!-- ログセクション -->
    <div class="accordion">
      <div style="display: flex; justify-content: space-between; align-items: center">
        <button class="accordion-button" style="flex: 1; margin-right: 10px">ログ表示</button>
        <button
          id="open-log-page"
          class="small-btn"
          style="margin-left: 10px"
          aria-label="専用ページで開く"
        >
          専用ページで開く
        </button>
      </div>
      <div class="accordion-content">
        <pre id="debug"></pre>
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
