<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Hello Voice - 読み上げ実績</title>
    <style>
      body {
        width: 100% !important;
        max-width: 100% !important;
        max-height: none !important;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .stats-container {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      .stats-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .stats-header h1 {
        margin: 0 0 4px;
        font-size: 22px;
      }
      .stats-header p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 13px;
      }

      /* Hero card */
      .stats-hero {
        background: var(--bg-section);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 28px 24px;
        text-align: center;
        margin-bottom: 24px;
      }
      .hero-emoji {
        font-size: 48px;
        line-height: 1;
        margin-bottom: 8px;
      }
      .hero-rank-name {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .hero-count {
        font-size: 40px;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 4px;
      }
      .hero-count-label {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 16px;
      }

      /* Progress bar */
      .progress-section {
        margin-top: 16px;
      }
      .progress-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 6px;
        display: flex;
        justify-content: space-between;
      }
      .progress-bar-bg {
        height: 12px;
        background: var(--border-color);
        border-radius: 6px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        border-radius: 6px;
        transition: width 0.4s ease;
      }
      .progress-max {
        text-align: center;
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 12px;
      }

      /* Rank list */
      .rank-list-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .rank-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rank-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: var(--bg-section);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        transition: opacity 0.2s;
      }
      .rank-item--current {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 1px var(--accent-color);
      }
      .rank-item--locked {
        opacity: 0.45;
      }
      .rank-item__emoji {
        font-size: 24px;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
      }
      .rank-item__info {
        flex: 1;
        min-width: 0;
      }
      .rank-item__name {
        font-weight: 600;
        font-size: 14px;
      }
      .rank-item__threshold {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .rank-item__check {
        font-size: 16px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="stats-container">
      <div class="stats-header">
        <h1>読み上げ実績</h1>
        <p>これまでの累計読み上げ数と現在のランク</p>
      </div>

      <div class="stats-hero">
        <div class="hero-emoji" id="hero-emoji">🔰</div>
        <div class="hero-rank-name" id="hero-rank-name">見習い配信リスナー</div>
        <div class="hero-count" id="hero-count">0</div>
        <div class="hero-count-label">累計読み上げ数</div>
        <div class="progress-section" id="progress-section">
          <div class="progress-label">
            <span id="progress-text">次のランクまで</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
          </div>
        </div>
        <div class="progress-max" id="progress-max" style="display: none"></div>
      </div>

      <div class="rank-list-title">ランク一覧</div>
      <div class="rank-list" id="rank-list"></div>
    </div>
    <script type="module" src="./stats.ts"></script>
  </body>
</html>
