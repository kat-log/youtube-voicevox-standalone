<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ずんだもん読み上げ - 話者数・話者設定</title>
    <style>
      body {
        width: 100% !important;
        max-width: 100% !important;
        max-height: none !important;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .page-container {
        max-width: 480px;
        margin: 0 auto;
        padding: 24px 20px;
      }
      .page-header {
        text-align: center;
        margin-bottom: 20px;
      }
      .page-header h1 {
        margin: 0 0 4px;
        font-size: 20px;
      }
      .page-header p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 13px;
      }

      /* Config sections */
      .config-section {
        margin-bottom: 16px;
        padding: 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-section);
      }
      .config-section label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .slider-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .slider-group input[type="range"] {
        flex: 1;
      }
      .slider-group span {
        min-width: 24px;
        text-align: center;
        font-weight: 600;
        font-size: 14px;
      }

      /* Speaker assignment */
      .speaker-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .speaker-row label {
        min-width: 56px;
        font-size: 13px;
        font-weight: 600;
      }
      .speaker-row select {
        flex: 1;
        padding: 6px 8px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-input);
        color: var(--text-primary);
        font-size: 13px;
      }

      .info-text {
        font-size: 12px;
        color: var(--text-secondary);
        margin: 4px 0 8px;
      }
      .note-box {
        padding: 10px 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-section);
        color: var(--text-secondary);
        font-size: 13px;
      }

      /* Test speak */
      .test-text-form label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .test-text-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
      }
      .test-text-input:focus {
        border-color: var(--accent-color);
      }
      .play-btn {
        padding: 4px 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
      }
      .play-btn:hover {
        background: var(--border-color);
      }
      .play-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .play-status {
        font-size: 11px;
        color: var(--text-secondary);
        min-width: 50px;
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 20px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="page-header">
        <h1>話者数・話者設定</h1>
        <p id="engine-label">読み込み中...</p>
      </div>

      <div class="config-section">
        <label for="speakerCount">話者数（同時再生数）:</label>
        <div class="slider-group">
          <input
            type="range"
            id="speakerCount"
            min="2"
            max="10"
            step="1"
            value="3"
            aria-label="話者数"
            aria-valuetext="3"
          />
          <span id="current-count">3</span>
        </div>
        <p class="info-text">並列再生時の同時再生数、持ち回り制話者モードの話者数として使用されます。</p>
      </div>

      <div class="test-text-form" style="margin-bottom: 12px;">
        <label for="testText">テスト再生テキスト:</label>
        <input
          type="text"
          class="test-text-input"
          id="testText"
          value="こんにちは、テスト再生です"
          placeholder="読み上げたいテキストを入力"
        />
      </div>

      <div id="speaker-assignments">
        <div class="config-section">
          <p class="info-text" style="margin-top: 0">話者1: メインの話者選択で設定したキャラクター</p>
          <div id="speaker-list">
            <div class="loading">話者リストを取得中...</div>
          </div>
        </div>
      </div>

      <div id="random-mode-note" class="note-box" style="display: none">
        ランダム話者モードが有効のため、個別の話者設定は不要です。<br />
        話者数（同時再生数）のみ設定してください。
      </div>

      <div id="round-robin-off-note" class="note-box" style="display: none">
        持ち回り制話者モードがオフのため、個別の話者設定は不要です。<br />
        話者数（同時再生数）のみ設定してください。
      </div>
    </div>

    <script type="module" src="./speaker-config.ts"></script>
  </body>
</html>
