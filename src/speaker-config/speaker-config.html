<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ずんだもん読み上げ - 話者数・話者設定</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .page-container {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 20px;
      }
      .page-header {
        text-align: center;
        margin-bottom: 20px;
      }
      .page-header h1 {
        margin: 0 0 4px;
        font-size: 20px;
      }
      .page-header p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 13px;
      }

      /* Main layout */
      .main-layout {
        display: flex;
        gap: 0;
        align-items: flex-start;
      }
      .config-area {
        flex: 1;
        min-width: 0;
      }

      /* Drag resizer between config-area and preset-panel */
      .resizer {
        width: 16px;
        flex-shrink: 0;
        cursor: col-resize;
        position: sticky;
        top: 16px;
        height: calc(100vh - 80px);
        display: flex;
        align-items: stretch;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
      }
      .resizer::after {
        content: '';
        width: 2px;
        background: var(--border-color);
        border-radius: 1px;
        transition: background 0.15s;
      }
      .resizer:hover::after,
      .resizer.dragging::after {
        background: var(--accent-color);
      }

      /* Config sections */
      .config-section {
        margin-bottom: 16px;
        padding: 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-section);
      }
      .config-section label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .slider-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .slider-group input[type="range"] {
        flex: 1;
      }
      .slider-group span {
        min-width: 24px;
        text-align: center;
        font-weight: 600;
        font-size: 14px;
      }

      /* Speaker assignment */
      .speaker-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .speaker-row label {
        min-width: 56px;
        font-size: 13px;
        font-weight: 600;
      }
      .speaker-row select {
        flex: 1;
        padding: 6px 8px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-input);
        color: var(--text-primary);
        font-size: 13px;
      }

      .info-text {
        font-size: 12px;
        color: var(--text-secondary);
        margin: 4px 0 8px;
      }
      .note-box {
        padding: 10px 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-section);
        color: var(--text-secondary);
        font-size: 13px;
      }

      /* Test speak */
      .test-text-form label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .test-text-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
      }
      .test-text-input:focus {
        border-color: var(--accent-color);
      }
      .play-btn {
        padding: 4px 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-section);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
      }
      .play-btn:hover {
        background: var(--border-color);
      }
      .play-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .play-status {
        font-size: 11px;
        color: var(--text-secondary);
        min-width: 50px;
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 20px;
        color: var(--text-secondary);
      }

      /* Preset panel (right side, sticky) */
      .preset-panel {
        width: 344px;
        flex-shrink: 0;
        position: sticky;
        top: 16px;
        max-height: calc(100vh - 80px);
        overflow-y: auto;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-section);
        padding: 14px;
        box-sizing: border-box;
      }
      .preset-panel-title {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-color);
      }
      .preset-save-row {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .preset-save-row input {
        flex: 1;
        min-width: 0;
        height: 30px;
        padding: 0 8px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 12px;
        outline: none;
        box-sizing: border-box;
      }
      .preset-save-row input:focus {
        border-color: var(--accent-color);
      }
      .preset-save-row button {
        height: 30px;
        padding: 0 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-primary);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .preset-save-row button:hover:not(:disabled) {
        background: var(--border-color);
      }
      .preset-save-row button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .preset-error {
        font-size: 12px;
        color: #e74c3c;
        margin-bottom: 8px;
      }
      .preset-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .preset-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-primary);
        transition: border-color 0.1s;
      }
      .preset-item.drag-over {
        border-color: var(--accent-color);
        background: var(--bg-section);
      }
      .preset-item.dragging {
        opacity: 0.4;
      }
      .preset-item-top {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .drag-handle {
        cursor: grab;
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1;
        flex-shrink: 0;
        user-select: none;
        padding: 0 2px;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .preset-item-name {
        flex: 1;
        font-size: 13px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .preset-item-meta {
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1;
      }
      .preset-rename-btn {
        flex-shrink: 0;
        background: none;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        cursor: pointer;
        color: var(--text-secondary);
        font-size: 11px;
        padding: 1px 5px;
        white-space: nowrap;
      }
      .preset-rename-btn:hover {
        background: var(--border-color);
        color: var(--text-primary);
      }
      .preset-name-input {
        flex: 1;
        font-size: 13px;
        padding: 1px 4px;
        border: 1px solid var(--accent-color);
        border-radius: 3px;
        background: var(--bg-section);
        color: var(--text-primary);
        min-width: 0;
      }
      .preset-name-confirm-btn,
      .preset-name-cancel-btn {
        flex-shrink: 0;
        background: none;
        border: 1px solid var(--border-color);
        border-radius: 3px;
        cursor: pointer;
        color: var(--text-primary);
        font-size: 11px;
        padding: 0 4px;
        height: 20px;
      }
      .preset-name-confirm-btn:hover {
        background: var(--accent-color);
        color: #fff;
        border-color: var(--accent-color);
      }
      .preset-name-cancel-btn:hover {
        background: var(--border-color);
      }
      .preset-item-actions {
        display: flex;
        gap: 4px;
      }
      .preset-item-actions button {
        flex: 1;
        height: 24px;
        padding: 0 4px;
        border: 1px solid var(--border-color);
        border-radius: 5px;
        background: var(--bg-section);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 11px;
        white-space: nowrap;
      }
      .preset-item-actions button:hover:not(:disabled) {
        background: var(--border-color);
      }
      .preset-item-actions button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .preset-load-btn {
        background: var(--accent-color) !important;
        color: #fff !important;
        border-color: var(--accent-color) !important;
      }
      .preset-load-btn:hover:not(:disabled) {
        opacity: 0.85;
        background: var(--accent-color) !important;
      }
      .preset-empty {
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
        padding: 8px 0;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="page-header">
        <h1>話者数・話者設定</h1>
        <p id="engine-label">読み込み中...</p>
      </div>

      <div class="main-layout">
        <div class="config-area">
          <div class="config-section">
            <label for="speakerCount">話者数（同時再生数）:</label>
            <div class="slider-group">
              <input
                type="range"
                id="speakerCount"
                min="2"
                max="10"
                step="1"
                value="3"
                aria-label="話者数"
                aria-valuetext="3"
              />
              <span id="current-count">3</span>
            </div>
            <p class="info-text">並列再生時の同時再生数、持ち回り制話者モードの話者数として使用されます。</p>
          </div>

          <div id="test-text-form" class="test-text-form" style="margin-bottom: 12px;">
            <label for="testText">テスト再生テキスト:</label>
            <input
              type="text"
              class="test-text-input"
              id="testText"
              value="こんにちは、テスト再生です"
              placeholder="読み上げたいテキストを入力"
            />
          </div>

          <div id="speaker-assignments">
            <div class="config-section">
              <p class="info-text" style="margin-top: 0">話者1: メインの話者選択で設定したキャラクター</p>
              <div id="speaker-list">
                <div class="loading">話者リストを取得中...</div>
              </div>
            </div>
          </div>

          <div id="random-mode-note" class="note-box" style="display: none">
            ランダム話者モードが有効のため、個別の話者設定は不要です。<br />
            話者数（同時再生数）のみ設定してください。
          </div>

          <div id="round-robin-off-note" class="note-box" style="display: none">
            持ち回り制話者モードがオフのため、個別の話者設定は不要です。<br />
            話者数（同時再生数）のみ設定してください。
          </div>
        </div>

        <div class="resizer" id="layoutResizer"></div>
        <div class="preset-panel" id="rrPresetSection">
          <div class="preset-panel-title">お気に入りプリセット</div>
          <div class="preset-save-row">
            <input type="text" id="rrPresetNameInput" placeholder="プリセット名..." maxlength="40" />
            <button type="button" id="rrSavePresetBtn">保存</button>
          </div>
          <div id="rrPresetError" class="preset-error" style="display:none"></div>
          <div class="preset-list" id="rrPresetList"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./speaker-config.ts"></script>
  </body>
</html>
